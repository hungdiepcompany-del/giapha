name: Cloudflare Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cloudflare-deploy:
    name: Cloudflare deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      A16P_OFFICIAL_IMPORT_RUNTIME_CANDIDATE_ENABLED: ${{ vars.A16P_OFFICIAL_IMPORT_RUNTIME_CANDIDATE_ENABLED || 'false' }}
      A16AH_OFFICIAL_IMPORT_EXECUTION_BRANCH_ENABLED: ${{ vars.A16AH_OFFICIAL_IMPORT_EXECUTION_BRANCH_ENABLED || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify deploy environment
        shell: bash
        run: |
          test -n "${CLOUDFLARE_API_TOKEN}" || (echo "CLOUDFLARE_API_TOKEN is missing" && exit 1)
          test -n "${CLOUDFLARE_ACCOUNT_ID}" || (echo "CLOUDFLARE_ACCOUNT_ID is missing" && exit 1)
          test -n "${NEXT_PUBLIC_SUPABASE_URL}" || (echo "NEXT_PUBLIC_SUPABASE_URL is missing" && exit 1)
          test -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" || (echo "NEXT_PUBLIC_SUPABASE_ANON_KEY is missing" && exit 1)
          test -n "${NEXT_PUBLIC_APP_URL}" || (echo "NEXT_PUBLIC_APP_URL is missing" && exit 1)
          test -n "${SUPABASE_SERVICE_ROLE_KEY}" || (echo "SUPABASE_SERVICE_ROLE_KEY is missing" && exit 1)
          test -n "${A16P_OFFICIAL_IMPORT_RUNTIME_CANDIDATE_ENABLED}" || (echo "A16P_OFFICIAL_IMPORT_RUNTIME_CANDIDATE_ENABLED default is missing" && exit 1)
          test -n "${A16AH_OFFICIAL_IMPORT_EXECUTION_BRANCH_ENABLED}" || (echo "A16AH_OFFICIAL_IMPORT_EXECUTION_BRANCH_ENABLED default is missing" && exit 1)
          echo "Required deploy environment is configured."

      - name: Check environment safety
        run: npm run check:env:safe

      - name: Check migrations order
        run: npm run check:migrations

      - name: Check deploy readiness
        run: npm run check:deploy-readiness

      - name: Check OpenNext Cloudflare wiring
        run: npm run check:opennext-cloudflare

      - name: Check service boundary
        run: npm run check:service-boundary

      - name: Check GitHub Actions build gate
        run: npm run check:github-actions-opennext

      - name: Check GitHub Actions deploy workflow
        run: npm run check:github-actions-deploy

      - name: Check A-16 runtime var preservation
        run: npm run check:a16ax-cloudflare-runtime-vars-preservation-deploy-wiring

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Next build
        run: npm run build

      - name: Deploy to Cloudflare
        run: npm run deploy
